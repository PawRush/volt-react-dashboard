version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: latest
    commands:
      - cd infra && npm ci --no-progress
  build:
    commands:
      - cp -r $CODEBUILD_SRC_DIR_FrontendBuildOutput/dist ./dist
      - cd infra && npm run build
      - |
        cd infra && npx cdk deploy VoltDashFrontend-$ENVIRONMENT \
          --context environment=$ENVIRONMENT \
          --context withAssets=false \
          --require-approval never \
          --progress events
      - |
        BUCKET=$(aws cloudformation describe-stacks \
          --stack-name VoltDashFrontend-$ENVIRONMENT \
          --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' \
          --output text)
      - |
        DIST_ID=$(aws cloudformation describe-stacks \
          --stack-name VoltDashFrontend-$ENVIRONMENT \
          --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
          --output text)
      - aws s3 sync dist/ s3://$BUCKET/ --delete
      - aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
      - |
        echo "Deployed to https://$(aws cloudformation describe-stacks \
          --stack-name VoltDashFrontend-$ENVIRONMENT \
          --query 'Stacks[0].Outputs[?OutputKey==`DistributionDomainName`].OutputValue' \
          --output text)"

cache:
  paths:
    - "~/.npm/**/*"
